<!DOCTYPE html>
<html>
<head>
    <title>ICAR-IIRR | 2FA Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #10b981; --dark: #022c22; --bg: #f0fdf4; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); display: flex; align-items: center; justify-content: center; }
        
        /* Premium Mesh Background */
        .bg-mesh { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-image: radial-gradient(at 0% 0%, hsla(160, 100%, 76%, 0.15) 0px, transparent 50%), radial-gradient(at 100% 100%, hsla(160, 100%, 76%, 0.1) 0px, transparent 50%); }
        
        .otp-card { width: 450px; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border-radius: 30px; padding: 50px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.8); animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .icon-circle { width: 80px; height: 80px; background: rgba(16, 185, 129, 0.1); color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; font-size: 32px; }
        
        h2 { font-size: 24px; color: var(--dark); margin-bottom: 10px; font-weight: 700; }
        p { color: #64748b; font-size: 14px; line-height: 1.6; margin-bottom: 30px; }
        
        /* OTP Input Styling */
        .otp-input { 
            width: 100%; padding: 18px; border-radius: 15px; border: 2px solid var(--primary); 
            background: white; font-family: 'Poppins'; font-size: 32px; font-weight: 700; 
            text-align: center; letter-spacing: 10px; color: var(--dark); transition: 0.3s; 
            margin-bottom: 25px; box-sizing: border-box;
        }
        .otp-input:focus { outline: none; box-shadow: 0 0 0 5px rgba(16, 185, 129, 0.1); }

        .verify-btn { 
            background: var(--primary); color: white; border: none; width: 100%; 
            padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 600; 
            cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); 
            font-family: 'Poppins';
        }
        .verify-btn:hover { background: #059669; transform: translateY(-2px); }
        
        .alert-error { 
            background: #fef2f2; color: #991b1b; padding: 12px; border-radius: 10px; 
            margin-bottom: 20px; font-size: 13px; font-weight: 600; border-left: 4px solid #ef4444;
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="otp-card">
        <div class="icon-circle"><i class="fa-solid fa-shield-halved"></i></div>
        <h2>Security Check</h2>
        <p>Enter the 6-digit verification code generated for your session.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert-error">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="/2fa">
            <input type="text" name="otp" class="otp-input" maxlength="6" placeholder="000000" autofocus required autocomplete="off">
            <button type="submit" class="verify-btn">Verify & Complete Login</button>
        </form>
    </div>
</body>
</html>
